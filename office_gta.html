<!DOCTYPE html>
<html>
  <head>
    <title>Office Universe - GTA Mode</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <script>
      // COMPONENT: TPS (Third Person Shooter) Rotation Logic
      // This forces the player model to rotate with the camera so 'Forward' is always 'Where you look'
      AFRAME.registerComponent('sync-rotation', {
        tick: function () {
          var camera = this.el.querySelector('a-camera');
          var mesh = this.el.querySelector('#avatar-mesh');
          if (!camera || !mesh) return;

          // Get the camera's Y rotation (looking left/right)
          var camRot = camera.getAttribute('rotation');
          
          // Apply that rotation to the player mesh so the "back" is always to the camera
          mesh.setAttribute('rotation', {x: 0, y: camRot.y, z: 0});
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="floor-tex" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
        <canvas id="poster-canvas" width="512" height="512"></canvas>
      </a-assets>

      <a-entity light="type: ambient; color: #FFF; intensity: 0.6"></a-entity>
      <a-entity light="type: spot; angle: 60; penumbra: 0.5; intensity: 0.8; castShadow: true" position="0 4 0" rotation="-90 0 0"></a-entity>


      <a-entity id="player-rig" movement-controls="speed: 0.15" position="0 0 0" sync-rotation>
        
        <a-camera position="0 2.2 3" look-controls="pointerLockEnabled: true">
            <a-cursor color="yellow" scale="0.5 0.5 0.5"></a-cursor>
        </a-camera>

        <a-entity id="avatar-mesh" position="0 1.6 0">
           <a-capsule radius="0.35" length="1" color="#0055ff" position="0 -0.5 0"></a-capsule>
           <a-sphere radius="0.25" color="#ffccaa" position="0 0.5 0"></a-sphere>
           <a-box color="#333" width="0.4" height="0.5" depth="0.2" position="0 -0.2 0.3"></a-box>
        </a-entity>
      </a-entity>


      <a-plane position="0 0 0" rotation="-90 0 0" width="16" height="24" color="#999" material="src: #floor-tex; repeat: 10 10"></a-plane>
      
      <a-plane position="0 4 0" rotation="90 0 0" width="16" height="24" color="#eee"></a-plane>
      <a-box position="0 3.9 0" width="0.8" height="0.1" depth="16" color="#222">
          <a-plane position="0 -0.06 0" rotation="90 0 0" width="0.6" height="15.8" color="#fff" emissive="#fff" emissive-intensity="1"></a-plane>
      </a-box>

      <a-box position="0 2 -9" width="16" height="4" depth="0.1" color="#fefefe"></a-box> <a-box position="0 2 9" width="16" height="4" depth="0.1" color="#fefefe"></a-box>  <a-box position="-6 2 0" width="0.1" height="4" depth="18" color="#fefefe"></a-box> <a-box position="6 2 0" width="0.1" height="4" depth="18" color="#fefefe"></a-box>  <a-plane position="0 2 -8.9" width="8" height="2" color="white" material="shader: flat; border: 1px solid silver">
        <a-box position="0 -1 0.1" width="8" height="0.05" depth="0.1" color="#ccc"></a-box> </a-plane>
      <a-box position="-5 1 -8.5" rotation="0 10 10" width="1.5" height="2" depth="0.05" color="white"></a-box>
      <a-box position="-5.1 1 -8.4" rotation="0 20 5" width="1.5" height="2" depth="0.05" color="#ddd"></a-box>
      <a-cylinder position="5 1.5 -8.8" radius="0.05" height="3" color="green" rotation="0 0 -5"></a-cylinder>
      <a-box position="5.2 0 -8.8" width="0.4" height="0.1" depth="0.2" color="green"></a-box>
      <a-cylinder position="4.5 0.3 -8.5" radius="0.25" height="0.6" color="grey" open-ended="true" side="double"></a-cylinder>


      <a-box position="6 1.1 -6" width="0.1" height="2.2" depth="1.2" color="#8B4513">
        <a-sphere position="-0.1 0 0.4" radius="0.05" color="silver"></a-sphere>
      </a-box>
      <a-box position="5.5 0.6 -3" width="1" height="1.2" depth="2.5" color="#888"></a-box>
      <a-box position="5.5 1.4 -3" width="0.6" height="0.4" depth="0.5" color="white">
        <a-plane position="-0.31 0 0" rotation="0 -90 0" width="0.5" height="0.3" color="#111"></a-plane>
      </a-box>


      <a-box position="0 0.8 2" width="0.1" height="1.6" depth="8" color="#dccfa4"></a-box>
      
      <a-box position="3 0.8 2" width="0.1" height="1.6" depth="8" color="#dccfa4"></a-box> <a-box position="1.5 0.8 2" width="3" height="0.05" depth="6" color="#eee"></a-box> <a-cylinder position="2 0.95 1" radius="0.15" height="0.25" color="#cc0000"></a-cylinder> 
      <a-sphere position="2 0.25 4" radius="0.25" color="#ff00aa"></a-sphere>

      <a-box position="-3 0.8 2" width="0.1" height="1.6" depth="8" color="#dccfa4"></a-box> <a-box position="-1.5 0.8 2" width="3" height="0.05" depth="6" color="#eee"></a-box> <a-box position="-1.5 1.2 0" width="0.1" height="0.4" depth="0.6" color="black" rotation="0 10 0"></a-box>
      <a-cylinder position="-1 0.5 1" radius="0.3" height="0.1" color="#8B4513"></a-cylinder>
      <a-box position="-1 0.9 1" width="0.1" height="0.6" depth="0.5" color="#8B4513"></a-box>

      <a-box position="0 1.5 8.5" width="2" height="3" depth="0.5" color="#555" material="wireframe: true"></a-box>
      <a-box position="0 1 8.5" width="1.8" height="0.8" depth="0.4" color="#333"></a-box> <a-cylinder position="-3.5 0.75 -4" radius="1.5" height="0.05" color="white" scale="1 1 1.8"></a-cylinder>
      <a-cylinder position="-3.5 0.375 -4" radius="0.3" height="0.75" color="#555"></a-cylinder>
      <a-entity position="-2 0 -4" rotation="0 90 0">
        <a-cylinder position="0 0.5 0" radius="0.3" height="0.1" color="#8B4513"></a-cylinder>
        <a-box position="-0.2 0.9 0" width="0.1" height="0.6" depth="0.4" color="#8B4513"></a-box>
      </a-entity>
      <a-entity position="-5 0 -4" rotation="0 -90 0">
        <a-cylinder position="0 0.5 0" radius="0.3" height="0.1" color="#8B4513"></a-cylinder>
        <a-box position="-0.2 0.9 0" width="0.1" height="0.6" depth="0.4" color="#8B4513"></a-box>
      </a-entity>

      <a-plane position="-5.9 2 -4" rotation="0 90 0" width="2" height="1.5" color="white" material="shader: flat">
          <a-text value="Attacks on\nAnonymous Routing" color="black" align="center" width="4"></a-text>
      </a-plane>

    </a-scene>
  </body>
</html>
