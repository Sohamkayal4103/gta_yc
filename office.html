<!DOCTYPE html>
<html>
  <head>
    <title>Office Room 3D Re-creation</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="floor-texture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
      </a-assets>

      <a-plane position="0 0 0" rotation="-90 0 0" width="15" height="20" color="#8c8c8c" material="src: #floor-texture; repeat: 10 10; roughness: 1"></a-plane>
      <a-plane position="0 3 0" rotation="90 0 0" width="15" height="20" color="#f0f0f0"></a-plane>
      <a-box position="0 1.5 -10" width="15" height="3" depth="0.1" color="#fefefe"></a-box> <a-box position="0 1.5 10" width="15" height="3" depth="0.1" color="#fefefe"></a-box>  <a-box position="-7.5 1.5 0" width="0.1" height="3" depth="20" color="#fefefe"></a-box> <a-box position="7.5 1.5 0" width="0.1" height="3" depth="20" color="#fefefe"></a-box>  <a-entity light="type: ambient; color: #BBB; intensity: 0.6"></a-entity>
      <a-box position="0 2.9 0" width="1" height="0.1" depth="12" color="#333" emissive="#FFF" emissive-intensity="0.5"></a-box>
      <a-entity light="type: point; intensity: 0.5; distance: 10" position="0 2.5 0"></a-entity>

      <a-plane position="0 1.6 9.9" rotation="0 180 0" width="6" height="1.2" color="#FFF" material="shader: flat; side: double; border: 1px solid silver">
        <a-box position="0 -0.6 0.05" width="6" height="0.05" depth="0.1" color="silver"></a-box>
      </a-plane>
      <a-plane position="-6 0.6 9.8" rotation="-10 160 0" width="1.5" height="2" color="white"></a-plane>
      <a-plane position="-6.1 0.6 9.7" rotation="-15 170 0" width="1.5" height="2" color="white"></a-plane>


      <a-box position="-7.4 1.1 6" width="0.1" height="2.2" depth="1" color="#C19A6B"></a-box>
      <a-sphere position="-7.3 1.1 6.3" radius="0.05" color="silver"></a-sphere>
      
      <a-box position="-7 0.6 4" width="0.6" height="1.2" depth="1" color="#999"></a-box>
      <a-box position="-7 1.4 4" width="0.5" height="0.35" depth="0.4" color="white">
        <a-plane position="0.26 0 0" rotation="0 90 0" width="0.4" height="0.35" color="#111"></a-plane> </a-box>


      <a-box position="0 0.75 -4" width="0.1" height="1.5" depth="8" color="#dccfa4"></a-box>
      <a-box position="-2 0.75 -4" width="2" height="0.05" depth="6" color="#f0f0f0"></a-box>
      <a-box position="2 0.75 -4" width="2" height="0.05" depth="6" color="#f0f0f0"></a-box>
      <a-cylinder position="2 0.9 -2" radius="0.1" height="0.3" color="black"></a-cylinder> <a-cylinder position="4.5 0.75 5" radius="1.5" height="0.05" color="#e0e0e0"></a-cylinder>
      <a-cylinder position="4.5 0.375 5" radius="0.2" height="0.75" color="#555"></a-cylinder> <a-cylinder position="3 0.5 5" radius="0.3" height="0.1" color="#7a2e2e"></a-cylinder>
      <a-box position="3 0.8 5" width="0.1" height="0.6" depth="0.4" color="#7a2e2e"></a-box>
      
      <a-cylinder position="6 0.5 5" radius="0.3" height="0.1" color="#7a2e2e"></a-cylinder>
      <a-box position="6 0.8 5" width="0.1" height="0.6" depth="0.4" color="#7a2e2e"></a-box>

      <a-entity position="0 1.6 8" rotation="0 180 0">
        <a-camera look-controls wasd-controls>
            <a-cursor></a-cursor>
        </a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
